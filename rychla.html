body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#8e4bff,#6c2ae8);color:#fff;
  display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:28px}
.splash{display:flex;flex-direction:column;align-items:center;gap:16px;max-width:340px}
.bolt{font-size:72px;line-height:1;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.12);opacity:1}}
.title{font-size:22px;font-weight:700}
.txt{font-size:15px;opacity:.9;line-height:1.5}
.btn{margin-top:6px;display:inline-block;background:#fff;color:#6c2ae8;
  font-size:17px;font-weight:700;padding:14px 28px;border-radius:14px;text-decoration:none}
.btn:active{opacity:.85}
.hint{font-size:13px;opacity:.78;line-height:1.5;margin-top:4px}
.hidden{display:none}
</style>
</head>
<body>
  <div class="splash">
    <div class="bolt">⚡</div>
    <!-- Spuštěno z plochy: tohle uvidíš jen na okamžik, než to skočí do zápisu -->
    <div id="loading">
      <div class="txt">Otevírám rychlou poznámku…</div>
    </div>
    <!-- Otevřeno v Safari: zůstane stát, ať to jde přidat na plochu -->
    <div id="landing" class="hidden">
      <div class="title">Rychlá poznámka</div>
      <a class="btn" href="poznamky.html?quick">Otevřít zápis</a>
      <div class="hint">Tip: <b>Sdílet → Přidat na plochu</b> a vznikne ti ikona blesku ⚡, která tě příště pustí rovnou do psaní.</div>
    </div>
  </div>
  <script>
    // Běží appka spuštěná z plochy (standalone web app)?
    var standalone = (window.navigator.standalone === true) ||
                     (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    if (standalone) {
      // Z plochy: rovnou do rychlého zápisu, žádné klepnutí navíc.
      location.replace('poznamky.html?quick');
    } else {
      // V Safari: zůstaň stát, ukaž tlačítko + návod na přidání na plochu.
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('landing').classList.remove('hidden');
    }
  </script>
</body>
</html>
