<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;padding-bottom:100px}
.navbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:16px max(16px, calc((100% - 680px)/2 + 16px));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.navbar-title{font-size:17px;font-weight:600;color:#1c1c1e}
.nav-btn{background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:15px;font-weight:600;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid rgba(0,0,0,0.1);display:flex;padding:8px max(0px, calc((100% - 680px)/2)) 20px;z-index:10}
.tbi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.tbi-icon{font-size:22px}
.tbi-label{font-size:10px;color:#8e8e93}
.tbi.on .tbi-label{color:#7c3aed}
.content{padding:16px;max-width:680px;margin:0 auto}
.sec-hdr{font-size:13px;color:#6c6c70;text-transform:uppercase;letter-spacing:.04em;padding:16px 4px 8px;display:flex;justify-content:space-between}
.card{background:#fff;border-radius:13px;overflow:hidden;margin-bottom:16px;border:1px solid #e0e0e0}
.crow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;gap:12px}
.crow:last-child{border-bottom:none}
.crow-icon{font-size:22px;width:32px;text-align:center}
.crow-label{flex:1;font-size:17px;color:#1c1c1e}
.crow-val{font-size:15px;font-weight:600;color:#ff3b30}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:500;color:#1c1c1e;margin-bottom:8px}
.empty-sub{font-size:15px;color:#8e8e93}
/* ADD FORM */
.form-page{display:none;padding-bottom:40px}
.form-page.on{display:block}
.home-page{display:block}
.home-page.off{display:none}
.back-btn{background:none;border:none;color:#007aff;font-size:17px;cursor:pointer;padding:4px 0}
.amount-box{background:#fff;border-radius:13px;padding:24px 16px;text-align:center;margin-bottom:16px;border:1px solid #e0e0e0}
.amt-inp{font-size:52px;font-weight:200;border:none;background:none;color:#1c1c1e;text-align:center;width:100%;outline:none}
.amt-inp::placeholder{color:#c7c7cc}
.date-inp{border:none;background:none;color:#6c6c70;font-size:14px;text-align:center;margin-top:8px;display:block;width:100%}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat-btn{background:#fff;border:2px solid #e0e0e0;border-radius:13px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.cat-btn.on{border-color:#007aff;background:#e8f0fe}
.cat-icon{font-size:26px}
.cat-lbl{font-size:11px;color:#6c6c70;text-align:center;line-height:1.3}
.cat-btn.on .cat-lbl{color:#007aff;font-weight:600}
.sub-list{background:#fff;border-radius:13px;overflow:hidden;margin-bottom:16px;border:1px solid #e0e0e0}
.sub-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;gap:12px}
.sub-item:last-child{border-bottom:none}
.sub-dot{width:22px;height:22px;border-radius:50%;border:2px solid #c7c7cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.sub-item.on .sub-dot{background:#007aff;border-color:#007aff;color:#fff}
.sub-lbl{font-size:17px;color:#1c1c1e}
.note-inp{background:#fff;border-radius:13px;padding:14px 16px;font-size:17px;color:#1c1c1e;border:1px solid #e0e0e0;width:100%;font-family:inherit;resize:none;display:block;margin-bottom:16px;min-height:80px}
.save-btn{width:100%;padding:16px;background:#007aff;color:#fff;border:none;border-radius:13px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
.save-btn:active{opacity:.8}
.exp-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0;gap:12px}
.exp-row:last-child{border-bottom:none}
.exp-ico{font-size:20px;width:36px;height:36px;background:#f2f2f7;border-radius:8px;display:flex;align-items:center;justify-content:center}
.exp-info{flex:1;min-width:0}
.exp-cat{font-size:15px;font-weight:500;color:#1c1c1e}
.exp-sub{font-size:13px;color:#6c6c70;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-amt{font-size:15px;font-weight:600;color:#ff3b30;text-align:right}
.big-sum{text-align:center;padding:24px 16px 0}
.big-amt{font-size:44px;font-weight:200;letter-spacing:-1px;color:#ff3b30}
.big-lbl{font-size:14px;color:#6c6c70;margin-top:4px;margin-bottom:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:15px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.on{opacity:1}
.bar-bg{height:4px;background:#f2f2f7;border-radius:2px;margin-top:5px}
.bar-fill{height:100%;background:#007aff;border-radius:2px}
.shared-toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:16px;border:1px solid #e0e0e0;cursor:pointer}
.shared-toggle.on{border-color:#ff2d78;background:#fff0f5}
.shared-label{font-size:16px;font-weight:500;color:#1c1c1e;display:flex;align-items:center;gap:8px}
.shared-toggle.on .shared-label{color:#ff2d78}
.toggle-sw{width:51px;height:31px;border-radius:16px;background:#e5e5ea;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:#ff2d78}
.toggle-knob{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .2s}
.toggle-sw.on .toggle-knob{transform:translateX(20px)}
.badge-shared{display:inline-flex;align-items:center;gap:3px;background:#ff2d78;color:#fff;border-radius:6px;font-size:10px;font-weight:600;padding:2px 6px;margin-left:6px;flex-shrink:0}
.mimoradny-toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:16px;border:1px solid #e0e0e0;cursor:pointer}
.mimoradny-toggle.on{border-color:#7c3aed;background:#f5f0ff}
.mimoradny-label{font-size:16px;font-weight:500;color:#1c1c1e;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mimoradny-toggle.on .mimoradny-label{color:#7c3aed}
.mimoradny-hint{font-size:11px;font-weight:400;color:#8e8e93}
.mimoradny-toggle .toggle-sw.on{background:#7c3aed}
.badge-mimoradny{display:inline-flex;align-items:center;gap:3px;background:#7c3aed;color:#fff;border-radius:6px;font-size:10px;font-weight:600;padding:2px 6px;margin-left:6px;flex-shrink:0}
.rodinny-toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:16px;border:1px solid #e0e0e0;cursor:pointer}
.rodinny-toggle.on{border-color:#ff9500;background:#fff7ed}
.rodinny-label{font-size:16px;font-weight:500;color:#1c1c1e;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rodinny-toggle.on .rodinny-label{color:#ff9500}
.rodinny-hint{font-size:11px;font-weight:400;color:#8e8e93}
.rodinny-toggle .toggle-sw.on{background:#ff9500}
.badge-rodinny{display:inline-flex;align-items:center;gap:3px;background:#ff9500;color:#fff;border-radius:6px;font-size:10px;font-weight:600;padding:2px 6px;margin-left:6px;flex-shrink:0}
.rod-bar{height:14px;border-radius:7px;overflow:hidden;display:flex;background:#f0f0f3}
.rod-catbar{height:5px;background:#f0f0f3;border-radius:3px;margin-top:5px;overflow:hidden}
.rod-catfill{height:100%;background:#ff9500;border-radius:3px}
.budget-banner{background:#fff;border-radius:16px;padding:18px 16px;margin-bottom:14px;text-align:center;border:1px solid #e8e8ed}
.bb-big{font-size:34px;font-weight:700;line-height:1}
.bb-cap{font-size:13px;color:#6c6c70;margin-top:6px}
.bb-rate{color:#7c3aed;cursor:pointer;white-space:nowrap}
.bb-bar{height:8px;background:#f0f0f3;border-radius:4px;overflow:hidden;margin:12px 0 8px}
.bb-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bb-sub{font-size:12px;color:#8e8e93}
.bb-note{font-size:13px;color:#8e8e93;padding:4px 0}
.jitka-sum{text-align:center;padding:20px 16px 4px}
.jitka-amt{font-size:40px;font-weight:200;letter-spacing:-1px;color:#ff2d78}
.jitka-lbl{font-size:13px;color:#6c6c70;margin-top:3px}

.home-link{cursor:pointer;transition:opacity .15s}
.home-link:hover{opacity:.55}
</style>

var tokenExpiry=parseInt(localStorage.getItem('g_token_expiry')||'0',10);

// Zpětná kompatibilita: ghToken() == „je připojeno?"
function ghToken(){ return localStorage.getItem('google_connected')?'google':''; }
function isConnected(){ return !!localStorage.getItem('google_connected'); }
function gisReady(){ return typeof google!=='undefined' && google.accounts && google.accounts.oauth2; }

function ensureTokenClient(){
  if(tokenClient) return true;
  if(!gisReady() || !GOOGLE_CLIENT_ID) return false;
  tokenClient=google.accounts.oauth2.initTokenClient({ client_id:GOOGLE_CLIENT_ID, scope:DRIVE_SCOPE, callback:function(){} });
  return true;
}

function getAccessToken(interactive){
  return new Promise(function(resolve,reject){
    if(accessToken && Date.now()<tokenExpiry-60000){ resolve(accessToken); return; }
    if(!GOOGLE_CLIENT_ID){ reject(new Error('chybí client id')); return; }
    if(!ensureTokenClient()){ reject(new Error('GIS not ready')); return; }
    tokenClient.callback=function(resp){
      if(resp && resp.error){ reject(new Error(resp.error)); return; }
      accessToken=resp.access_token;
      tokenExpiry=Date.now()+((resp.expires_in||3600)*1000);
      localStorage.setItem('google_connected','1');
      localStorage.setItem('g_access_token',accessToken);
      localStorage.setItem('g_token_expiry',String(tokenExpiry));
      resolve(accessToken);
    };
    tokenClient.error_callback=function(err){ reject(new Error('oauth '+((err&&err.type)||'error'))); };
    try{ tokenClient.requestAccessToken({prompt: interactive?'consent':''}); }
    catch(e){ reject(e); }
  });
}

async function driveApi(url,opts){
  opts=opts||{};
  var token=await getAccessToken(false);
  opts.headers=Object.assign({},opts.headers,{'Authorization':'Bearer '+token});
  var res=await fetch(url,opts);
  if(res.status===401){
    accessToken=''; tokenExpiry=0;
    token=await getAccessToken(false);
    opts.headers['Authorization']='Bearer '+token;
    res=await fetch(url,opts);
  }
  return res;
}

function driveIdKey(fname){ return 'drive_id_'+fname; }

async function driveFindFile(fname){
  var ck=driveIdKey(fname);
  var id=localStorage.getItem(ck)||'';
  if(id){
    var rr=await driveApi('https://www.googleapis.com/drive/v3/files/'+id+'?fields=id,trashed');
    if(rr.ok){ var dd=await rr.json(); if(!dd.trashed) return id; }
    localStorage.removeItem(ck);
  }
  var q=encodeURIComponent("name='"+fname+"' and trashed=false");
  var r=await driveApi('https://www.googleapis.com/drive/v3/files?q='+q+'&spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc');
  if(!r.ok) throw new Error('FIND '+r.status);
  var d=await r.json();
  if(d.files && d.files.length){ localStorage.setItem(ck,d.files[0].id); return d.files[0].id; }
  return '';
}

async function driveReadJSON(fname){
  var id=await driveFindFile(fname);
  if(!id) return {data:null, exists:false};
  var r=await driveApi('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
  if(!r.ok) throw new Error('READ '+r.status);
  var j=null; try{ j=await r.json(); }catch(e){ j=null; }
  return {data:j, exists:true};
}

async function driveWriteJSON(fname,obj){
  var json=JSON.stringify(obj,null,2);
  var id=localStorage.getItem(driveIdKey(fname)) || await driveFindFile(fname);
  if(id){
    var r=await driveApi('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=media',
      {method:'PATCH',headers:{'Content-Type':'application/json'},body:json});
    if(!r.ok) throw new Error('UPDATE '+r.status);
    return id;
  }
  var boundary='vyd'+Date.now();
  var meta=JSON.stringify({name:fname,mimeType:'application/json'});
  var body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+
           '\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+json+'\r\n--'+boundary+'--';
  var r2=await driveApi('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    {method:'POST',headers:{'Content-Type':'multipart/related; boundary='+boundary},body:body});
  if(!r2.ok) throw new Error('CREATE '+r2.status);
  var d=await r2.json(); localStorage.setItem(driveIdKey(fname),d.id);
  return d.id;
}

// Nastavení (očekávaná výplata, cíl úspor) — sloučení podle updatedAt, novější vyhrává
async function ghLoadCfg(){
  if(!isConnected()) return;
  try{
    var r=await driveReadJSON(GH_FILE_CFG);
    if(r.exists && r.data && typeof r.data==='object' && !Array.isArray(r.data)){
      var remoteU=r.data.updatedAt||0;
      if(remoteU>=cfgUpdated){
        if(typeof r.data.expectedMzda==='number'){ expectedMzda=r.data.expectedMzda; localStorage.setItem('vyd_expected_mzda',expectedMzda); }
        if(typeof r.data.savingsRate==='number'){ savingsRate=r.data.savingsRate; localStorage.setItem('vyd_savings_rate',savingsRate); }
        if(r.data.jitkaClaims && typeof r.data.jitkaClaims==='object' && !Array.isArray(r.data.jitkaClaims)){ jitkaClaims=r.data.jitkaClaims; localStorage.setItem('vyd_jitka_claims',JSON.stringify(jitkaClaims)); }
        cfgUpdated=remoteU; localStorage.setItem('vyd_cfg_updated',String(cfgUpdated));
      }
    }
  }catch(e){ console.error('driveLoadCfg:',e); }
}
async function ghSaveCfg(){
  cfgUpdated=Date.now(); localStorage.setItem('vyd_cfg_updated',String(cfgUpdated));
  if(!isConnected()) return;
  try{ await driveWriteJSON(GH_FILE_CFG,{expectedMzda:expectedMzda,savingsRate:savingsRate,jitkaClaims:jitkaClaims,updatedAt:cfgUpdated}); }

async function connectGoogle(){

  try{ await getAccessToken(true); }

  updateSyncIcon('syncing');

function disconnectGoogle(){
  if(accessToken){ try{ google.accounts.oauth2.revoke(accessToken,function(){}); }catch(e){} }
  accessToken=''; tokenExpiry=0; localStorage.removeItem('google_connected'); localStorage.removeItem('g_access_token'); localStorage.removeItem('g_token_expiry');
  updateSyncIcon('local'); renderHome(); showToast('Odhlášeno — data zůstávají lokálně i na Disku');
}


function daysLeftInMonth(){
  var now=new Date();
  var last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return last-now.getDate()+1; // včetně dneška
}
function currentMzda(){
  var now=new Date();
  for(var i=0;i<finance.length;i++){
    var p=finance[i];
    var d=new Date(p.date+'T12:00:00');
    if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&p.mzda) return p.mzda;
  }
  return null;
}
function budgetInfo(){
  var realMzda=currentMzda();
  var mzda=realMzda||expectedMzda;
  if(!mzda)return null;
  var odhad=!realMzda;
  var now=new Date();
  var trvaleTotal=trvale.filter(isActive).reduce(function(s,t){return s+(t.castka||0)},0);
  var bezne=0, todayTotal=0, tod=today();
  exps.forEach(function(e){
    if(e.mimoradny)return; // mimořádné výdaje rozpočet ignoruje
    var d=new Date(e.date);
    if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()) bezne+=e.amount||0;
    if(e.date===tod) todayTotal+=e.amount||0;
  });
  var cil=mzda*savingsRate/100;
  var limit=mzda-trvaleTotal-cil;
  var dny=daysLeftInMonth();
  var zbyvaMesic=limit-bezne;
  var denni=zbyvaMesic/dny;
  var dnesZbyva=denni-todayTotal;
  return {mzda:mzda,odhad:odhad,trvaleTotal:trvaleTotal,bezne:bezne,todayTotal:todayTotal,cil:cil,limit:limit,dny:dny,zbyvaMesic:zbyvaMesic,denni:denni,dnesZbyva:dnesZbyva};
}
function setSavingsRate(){
  var val=prompt('Kolik % čisté mzdy chceš měsíčně ušetřit?\n(z toho se počítá denní rozpočet)', savingsRate);
  if(val===null)return;
  var n=parseFloat(val);
  if(isNaN(n)||n<0||n>100){showToast('Zadej číslo 0–100');return;}
  savingsRate=n;
  localStorage.setItem('vyd_savings_rate',n);
  ghSaveCfg();
  renderHome();
}
function setExpectedMzda(){
  var val=prompt('Očekávaná čistá výplata (Kč)?\nPoužije se pro denní rozpočet, dokud nezadáš skutečnou mzdu pro tento měsíc ve Finance trackeru.', expectedMzda||'');
  if(val===null)return;
  var n=parseFloat(String(val).replace(/\s/g,'').replace(',','.'));
  if(isNaN(n)||n<0){showToast('Zadej částku ≥ 0');return;}
  expectedMzda=n;
  localStorage.setItem('vyd_expected_mzda',n);
  ghSaveCfg();
  renderHome();
}
function budgetBannerHtml(){
  var b=budgetInfo();
  if(!b){
    return '<div class="budget-banner"><div class="bb-note">Pro denní rozpočet <span class="bb-rate" onclick="setExpectedMzda()">zadej očekávanou výplatu ✎</span><br>nebo skutečnou mzdu pro tento měsíc ve Finance trackeru. <span class="bb-rate" onclick="setSavingsRate()">cíl úspor '+savingsRate+' % ✎</span></div></div>';
  }
  var over=b.dnesZbyva<0;
  var color=over?'#ff3b30':(b.dnesZbyva<b.denni*0.25?'#ff9500':'#34c759');
  var spentPct=Math.min(100,Math.max(0,Math.round(b.todayTotal/Math.max(b.denni,1)*100)));
  var barColor=spentPct>100?'#ff3b30':spentPct>75?'#ff9500':'#34c759';
  var amt=Math.round(Math.abs(b.dnesZbyva)).toLocaleString('cs-CZ');
  return '<div class="budget-banner">'
    +'<div class="bb-big" style="color:'+color+'">'+(over?'−':'')+amt+' Kč</div>'
    +'<div class="bb-cap">'+(over?'dnes jsi přes denní rozpočet':'můžeš dnes ještě utratit')
      +(b.odhad?' · <span class="bb-rate" onclick="setExpectedMzda()">odhad výplaty ✎</span>':'')
      +' · <span class="bb-rate" onclick="setSavingsRate()">cíl úspor '+savingsRate+' % ✎</span></div>'
    +'<div class="bb-bar"><div class="bb-bar-fill" style="width:'+spentPct+'%;background:'+barColor+'"></div></div>'
    +'<div class="bb-sub">Dnes '+fmt(b.todayTotal)+' z denního rozpočtu '+fmt(b.denni)+' · do konce měsíce zbývá '+fmt(b.zbyvaMesic)+'</div>'
    +'</div>';
}

// Vlastní podkategorie — localStorage (cache) + odvozené z už zadaných výdajů (synced přes GitHub)
function loadCustomSubs(catKey) {
  var fromLocal=[];
  try { fromLocal = JSON.parse(localStorage.getItem('custom_subs_'+catKey)||'[]'); } catch(e) {}
  // Podkategorie použité v existujících výdajích téhle kategorie (jsou na GitHubu → synced, přežijí smazání localStorage)
  var fromExps=[];
  var cat=catByKey(catKey);
  var fixed=(cat?cat.s:[]);
  (exps||[]).forEach(function(e){
    if(e.catKey===catKey && e.subcat && fixed.indexOf(e.subcat)===-1 && fromExps.indexOf(e.subcat)===-1){
      fromExps.push(e.subcat);
    }
  });
  // Sloučení bez duplicit
  var all=fromExps.slice();
  fromLocal.forEach(function(s){ if(all.indexOf(s)===-1) all.push(s); });
  return all;
}
function saveCustomSubs(catKey, subs) {
  localStorage.setItem('custom_subs_'+catKey, JSON.stringify(subs));
}

function pickCat(k){
  selCat=k;selSub='';
  for(var i=0;i<CATS.length;i++){
    var el=document.getElementById('cb-'+CATS[i].k);
    if(el)el.className='cat-btn'+(CATS[i].k===k?' on':'');
  }
  renderSubcats(k);
}

function renderSubcats(k) {
  var cat=catByKey(k);
  var customSubs=loadCustomSubs(k);
  var allSubs=(cat?cat.s:[]).concat(customSubs);
  var html='';
  if(allSubs.length||cat){
    html='<div class="sec-hdr">Podkategorie</div><div class="sub-list">';
    // Pevné podkategorie
    if(cat){
      for(var j=0;j<cat.s.length;j++){
        var s=cat.s[j];
        html+='<div class="sub-item" id="si-'+j+'" onclick="pickSub(\''+s.replace(/'/g,"\\'")+'\')">'
          +'<div class="sub-dot">✓</div>'
          +'<span class="sub-lbl">'+s+'</span>'
          +'</div>';
      }
    }
    // Vlastní podkategorie
    for(var c=0;c<customSubs.length;c++){
      var cs=customSubs[c];
      var inUse=(exps||[]).some(function(e){return e.catKey===k && e.subcat===cs;});
      html+='<div class="sub-item" onclick="pickSub(\''+cs.replace(/'/g,"\\'")+'\')">'+
        '<div class="sub-dot">✓</div>'+
        '<span class="sub-lbl">'+cs+'</span>'+
        (inUse?'':'<button onclick="event.stopPropagation();deleteCustomSub(\''+k+'\',\''+cs.replace(/'/g,"\\'")+'\');" style="background:none;border:none;cursor:pointer;color:#ff3b30;font-size:13px;margin-left:auto;padding:0 4px">✕</button>')+
        '</div>';
    }
    // Tlačítko přidat vlastní
    html+='<div style="padding:8px 4px">'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<input type="text" id="custom-sub-inp" placeholder="+ Vlastní podkategorie…" style="flex:1;padding:8px 10px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);font-size:14px;font-family:inherit;background:#f2f2f7;color:#1c1c1e;outline:none">'
      +'<button onclick="addCustomSub(\''+k+'\')" style="padding:8px 12px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">Přidat</button>'
      +'</div>'
      +'</div>';
    html+='</div>';
  }
  document.getElementById('sub-section').innerHTML=html;
}

function addCustomSub(catKey) {
  var inp = document.getElementById('custom-sub-inp');
  if (!inp || !inp.value.trim()) return;
  var val = inp.value.trim();
  var subs = loadCustomSubs(catKey);
  if (subs.indexOf(val) === -1) { subs.push(val); saveCustomSubs(catKey, subs); }
  pickSub(val);
  renderSubcats(catKey);
  // Označ novou podkategorii
  setTimeout(function(){ pickSub(val); renderSubcats(catKey); }, 50);
}

function deleteCustomSub(catKey, sub) {
  var subs = loadCustomSubs(catKey).filter(function(s){ return s !== sub; });
  saveCustomSubs(catKey, subs);
  if (selSub === sub) selSub = '';
  renderSubcats(catKey);
}

function pickSub(s){
  selSub=(selSub===s)?'':s;
  var items=document.querySelectorAll('.sub-item');
  for(var i=0;i<items.length;i++){
    var lbl=items[i].querySelector('.sub-lbl');
    if(lbl){items[i].className='sub-item'+(lbl.textContent===selSub?' on':'');}
  }
}

    // Editace existujícího záznamu
    exps = exps.map(function(e){
      return e.id===editExpId ? {id:e.id,amount:amount,catKey:selCat,subcat:selSub,note:noteEl?noteEl.value:'',date:dtEl?dtEl.value:today(),shared:selShared,mimoradny:selMimoradny,rodinny:selRodinny} : e;

      id:Date.now().toString(),

var katMonth='';
function shiftMonthKey(mk,delta){
  var y=+mk.slice(0,4), m=+mk.slice(5,7)-1;
  var d=new Date(y,m+delta,1);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
}
function monthLabel(mk){
  var y=+mk.slice(0,4), m=+mk.slice(5,7)-1;
  return new Date(y,m,1).toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
}
function katMonthBounds(){
  var ms=exps.map(function(e){return (e.date||'').slice(0,7)}).filter(Boolean);
  if(!ms.length){var c=new Date();var ck=c.getFullYear()+'-'+('0'+(c.getMonth()+1)).slice(-2);return{min:ck,max:ck};}
  ms.sort();
  return {min:ms[0],max:ms[ms.length-1]};
}
function katShift(delta){
  var b=katMonthBounds();
  var nm=shiftMonthKey(katMonth,delta);
  if(nm<b.min||nm>b.max)return;
  katMonth=nm; renderHome();
}
var katSkipMim=false;
function katToggleMim(){ katSkipMim=!katSkipMim; renderHome(); }

function renderKat(){
  if(!exps.length)return'<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Žádná data</div></div>';
  var b=katMonthBounds();
  var now=new Date();
  var curKey=now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2);
  if(!katMonth) katMonth=(curKey>=b.min&&curKey<=b.max)?curKey:b.max;
  if(katMonth<b.min)katMonth=b.min;
  if(katMonth>b.max)katMonth=b.max;
  var monthAll=exps.filter(function(e){return (e.date||'').slice(0,7)===katMonth});
  var hasMim=monthAll.some(function(e){return e.mimoradny;});
  var thisM=katSkipMim?monthAll.filter(function(e){return !e.mimoradny;}):monthAll;
  var byCat={};
  thisM.forEach(function(e){
    if(!byCat[e.catKey])byCat[e.catKey]={total:0,subs:{}};
    byCat[e.catKey].total+=e.amount||0;
    var sub=e.subcat||'(bez podkategorie)';
    if(!byCat[e.catKey].subs[sub])byCat[e.catKey].subs[sub]={total:0,items:[]};
    byCat[e.catKey].subs[sub].total+=e.amount||0;
    byCat[e.catKey].subs[sub].items.push(e);
  });
  var total=Object.values(byCat).reduce(function(s,v){return s+v.total},0);
  var entries=Object.entries(byCat).sort(function(a,b){return b[1].total-a[1].total});
  var canPrev=katMonth>b.min, canNext=katMonth<b.max;
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px">'
    +'<span onclick="'+(canPrev?'katShift(-1)':'')+'" style="font-size:24px;line-height:1;color:'+(canPrev?'#7c3aed':'#d1d1d6')+';cursor:'+(canPrev?'pointer':'default')+';width:36px;text-align:center;-webkit-user-select:none;user-select:none">‹</span>'
    +'<div style="text-align:center"><div style="font-size:15px;font-weight:600;color:#1c1c1e;text-transform:capitalize">'+monthLabel(katMonth)+'</div><div style="font-size:13px;color:#8e8e93">'+fmt(total)+'</div></div>'
    +'<span onclick="'+(canNext?'katShift(1)':'')+'" style="font-size:24px;line-height:1;color:'+(canNext?'#7c3aed':'#d1d1d6')+';cursor:'+(canNext?'pointer':'default')+';width:36px;text-align:center;-webkit-user-select:none;user-select:none">›</span>'
    +'</div>';
  if(hasMim){
    h+='<div style="text-align:center;margin:-6px 0 14px">'
      +'<span onclick="katToggleMim()" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:999px;cursor:pointer;-webkit-user-select:none;user-select:none;border:0.5px solid '+(katSkipMim?'#7c3aed':'rgba(0,0,0,0.12)')+';background:'+(katSkipMim?'#f5f0ff':'#fff')+';color:'+(katSkipMim?'#7c3aed':'#6c6c70')+'">⭐ '+(katSkipMim?'Mimořádné skryté':'Skrýt mimořádné')+'</span>'
      +'</div>';
  }
  if(!entries.length) h+='<div class="empty"><div class="empty-icon">🗓</div><div class="empty-sub">Žádné výdaje v tomto měsíci</div></div>';
  entries.forEach(function(pair){
    var k=pair[0],v=pair[1];
    var cat=catByKey(k);
    var pct=total>0?Math.round(v.total/total*100):0;
    var subEntries=Object.entries(v.subs).sort(function(a,b){return b[1].total-a[1].total});
    var catId='cat-sub-'+k;
    h+='<div class="card" style="margin-bottom:8px">'
      +'<div class="exp-row" onclick="toggleKatSubs(\''+catId+'\')" style="cursor:pointer">'
      +'<div class="exp-ico">'+(cat?cat.i:'❓')+'</div>'
      +'<div class="exp-info">'
      +'<div class="exp-cat">'+(cat?cat.l:k)+'</div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div class="exp-amt">'+fmt(v.total)+'</div>'
      +'<div style="font-size:12px;color:#8e8e93">'+pct+' % <span id="chev-'+catId+'" style="display:inline-block;transition:transform 0.2s">▼</span></div>'
      +'</div>'
      +'</div>'
      // Podkategorie — defaultně skryté
      +'<div id="'+catId+'" style="display:none;border-top:0.5px solid #f0f0f0">';
    subEntries.forEach(function(sp){
      var sk=sp[0],sd=sp[1],sv=sd.total;
      var spct=v.total>0?Math.round(sv/v.total*100):0;
      h+='<div class="exp-row" style="padding-left:48px;background:#f9f9f9">'
        +'<div class="exp-info"><div class="exp-cat" style="font-size:13px;color:#3c3c3c">'+sk+'</div></div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:13px;font-weight:500;color:#ff3b30">'+fmt(sv)+'</div>'
        +'<div style="font-size:11px;color:#8e8e93">'+spct+' %</div>'
        +'</div>'
        +'</div>';
      // Výdaje s poznámkou v této podkategorii
      [].concat(sd.items).filter(function(e){return e.note;}).sort(function(a,b){return b.date.localeCompare(a.date)}).forEach(function(e){
        var dt2=new Date(e.date+'T12:00:00');
        var dayLbl=dt2.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
        h+='<div class="exp-row" style="padding-left:60px;background:#fcfcfc">'
          +'<div class="exp-info"><div class="exp-sub" style="white-space:normal;color:#6c6c70">📝 '+e.note+' <span style="color:#aeaeb2">· '+dayLbl+'</span></div></div>'
          +'<div style="font-size:12px;color:#8e8e93;flex-shrink:0">'+fmt(e.amount)+'</div>'
          +'</div>';
      });
    });
    h+='</div></div>';
  });
  return h;
}

function toggleKatSubs(id) {
  var el=document.getElementById(id);
  var chev=document.getElementById('chev-'+id);
  if(!el)return;
  var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(chev)chev.style.transform=open?'':'rotate(180deg)';
}

function trvalaActiveInMonth(t,m){
  // m = 'YYYY-MM'; aktivní v daném měsíci, pokud se s ním platnost od/do překrývá
  var om=t.od?t.od.slice(0,7):null;
  var dm=t.do?t.do.slice(0,7):null;
  if(om&&om>m)return false;
  if(dm&&dm<m)return false;
  return true;
}

function famForMonth(m){
  // Rodinné výdaje, které Lukáš nese SÁM (nevstupují do vyrovnání) = rodinny && !shared + aktivní rodinné trvalé platby
  var items=exps.filter(function(e){return e.rodinny&&!e.shared&&e.date.slice(0,7)===m;});
  items.sort(function(a,b){return b.date.localeCompare(a.date);});
  var recurItems=trvale.filter(function(t){return t.rodinne&&trvalaActiveInMonth(t,m);});
  var solo=items.reduce(function(s,e){return s+(e.amount||0);},0);
  var recur=recurItems.reduce(function(s,t){return s+(t.castka||0);},0);
  return {items:items,recurItems:recurItems,solo:solo,recur:recur,total:solo+recur};
}

function renderJitka(){
  var shared=exps.filter(function(e){return e.shared});
  if(!shared.length){
    return '<div class="empty"><div class="empty-icon">👫</div>'
      +'<div class="empty-title">Žádné sdílené výdaje</div>'
      +'<div class="empty-sub">Při zadávání výdaje zapni přepínač "Sdíleno s Jitkou"</div>'
      +'</div>';
  }

  // Seskup po měsících
  var byMonth={};
  shared.forEach(function(e){
    var m=e.date.slice(0,7);
    if(!byMonth[m])byMonth[m]=[];
    byMonth[m].push(e);
  });
  var months=Object.keys(byMonth).sort(function(a,b){return b.localeCompare(a)});

  // Celkový dluh z nevyúčtovaných měsíců
  var totalUnpaid=shared.filter(function(e){return !e.jitkaSettled}).reduce(function(s,e){return s+(e.amount||0)},0);
  // Souhrn částek od Jitky jen za měsíce, kde je ještě co vyúčtovat
  var totalClaimUnpaid=0;
  months.forEach(function(m){
    if(byMonth[m].some(function(e){return !e.jitkaSettled})) totalClaimUnpaid+=(jitkaClaims[m]||0);
  });
  var netGlobal=totalUnpaid/2 - totalClaimUnpaid/2;
  var topPos=netGlobal>=0;

  var h='<div class="jitka-sum">'
    +'<div class="jitka-amt" style="color:'+(topPos?'#ff2d78':'#34c759')+'">'+fmt(Math.abs(netGlobal))+'</div>'
    +'<div class="jitka-lbl">'+(topPos?'Jitka ti celkem dluží (nevyúčtované)':'Celkem dlužíš Jitce (nevyúčtované)')+'</div>'
    +'</div>';

  months.forEach(function(m){
    var items=byMonth[m];
    var dt=new Date(m+'-01T12:00:00');
    var monthLbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
    var monthTotal=items.reduce(function(s,e){return s+(e.amount||0)},0);
    var unpaidItems=items.filter(function(e){return !e.jitkaSettled});
    var paidItems=items.filter(function(e){return e.jitkaSettled});
    var unpaidTotal=unpaidItems.reduce(function(s,e){return s+(e.amount||0)},0);
    var isSettled=unpaidItems.length===0;
    var claimM=jitkaClaims[m]||0;            // co po mně za tento měsíc chce Jitka
    // otevřený měsíc počítá z toho, co zbývá; vyúčtovaný z celého měsíce
    var baseHalf=(isSettled?monthTotal:unpaidTotal)/2;
    var netM=baseHalf - claimM/2;            // + = Jitka platí mně, − = platím Jitce
    var sectionId='jm-'+m.replace('-','');

    // Hlavička měsíce
    h+='<div style="margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px">'
      +'<div onclick="toggleJitkaMonth(\''+sectionId+'\')" style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer">'
      +'<span style="font-size:13px;color:#6c6c70;text-transform:uppercase;letter-spacing:.04em;font-weight:500">'+monthLbl+'</span>'
      +(isSettled?'<span style="background:#34c759;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">VYÚČTOVÁNO</span>':'')
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:13px;color:'+(isSettled?'#34c759':(netM>=0?'#ff2d78':'#1c1c1e'))+';font-weight:600">'+fmt(Math.abs(netM))+'</span>'
      +'<button onclick="printMonth(\''+m+'\')" title="Tisknout / PDF" style="background:none;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:14px;padding:3px 8px;color:#6c6c70">🖨</button>'
      +'<span onclick="toggleJitkaMonth(\''+sectionId+'\')" id="chev-'+sectionId+'" style="font-size:12px;color:#aeaeb2;transition:transform .2s;display:inline-block;cursor:pointer">'+(isSettled?'▶':'▼')+'</span>'
      +'</div>'
      +'</div>'

      // Obsah měsíce — defaultně otevřeno pro nevyúčtované, zavřeno pro vyúčtované
      +'<div id="'+sectionId+'" style="display:'+(isSettled?'none':'block')+'">';

    // Nevyúčtované položky
    if(unpaidItems.length){
      h+='<div class="card" style="margin-bottom:8px">';
      [].concat(unpaidItems).sort(function(a,b){return b.date.localeCompare(a.date)}).forEach(function(e){
        var cat=catByKey(e.catKey);
        var dt2=new Date(e.date+'T12:00:00');
        var dayLbl=dt2.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
        h+='<div class="exp-row">'
          +'<div class="exp-ico">'+(cat?cat.i:'❓')+'</div>'
          +'<div class="exp-info">'
          +'<div class="exp-cat">'+(cat?cat.l:e.catKey)+'</div>'
          +'<div class="exp-sub">'+dayLbl+(e.subcat?' · '+e.subcat:'')+(e.note?' · '+e.note:'')+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
          +'<div class="exp-amt">'+fmt(e.amount)+'</div>'
          +'<div style="font-size:11px;color:#ff2d78;font-weight:600">½ = '+fmt(e.amount/2)+'</div>'
          +'</div>'
          +'<button onclick="event.stopPropagation();settleExp(\''+e.id+'\')" title="Zaplaceno" style="background:none;border:1px solid #34c759;border-radius:8px;cursor:pointer;font-size:13px;color:#34c759;padding:4px 8px;flex-shrink:0;margin-left:4px">✓</button>'
          +'</div>';
      });
      h+='</div>';
    }

    // Pole: kolik po mně za tento měsíc chce Jitka + netto výpočet (i u vyúčtovaného — kvůli opravě)
    h+='<div class="card" style="margin-bottom:8px;padding:12px 14px">'
      +'<div style="font-size:14px;font-weight:500;color:#1c1c1e;margin-bottom:8px">👜 Co po mně chce Jitka (její nákupy)</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<input type="number" inputmode="decimal" value="'+(claimM||'')+'" placeholder="0" onchange="setJitkaClaim(\''+m+'\', this.value)" style="flex:1;min-width:0;padding:9px 12px;border:1px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit;-webkit-appearance:none;background:#fff">'
      +'<span style="font-size:14px;color:#6c6c70;flex-shrink:0">Kč</span>'
      +'</div>'
      +'<div style="font-size:13px;color:#6c6c70;display:flex;justify-content:space-between;padding:2px 0"><span>'+(isSettled?'Jitka zaplatila':'Jitka ti dluží')+' (tvé sdílené ÷ 2)</span><span style="font-weight:500;color:#1c1c1e">'+fmt(baseHalf)+'</span></div>'
      +(claimM>0?'<div style="font-size:13px;color:#6c6c70;display:flex;justify-content:space-between;padding:2px 0"><span>Tvá spoluúčast (její nákup ÷ 2)</span><span style="font-weight:500;color:#1c1c1e">− '+fmt(claimM/2)+'</span></div>':'')
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:15px;font-weight:700">'
      +(netM>=0
         ?'<span style="color:#1c1c1e">'+(isSettled?'Vyrovnáno — Jitka zaplatila':'Jitka ti dluží')+'</span><span style="color:'+(isSettled?'#34c759':'#ff2d78')+'">'+fmt(netM)+'</span>'
         :'<span style="color:#1c1c1e">'+(isSettled?'Vyrovnáno — zaplatil jsi Jitce':'Máš zaplatit Jitce')+'</span><span style="color:#34c759">'+fmt(Math.abs(netM))+'</span>')
      +'</div>'
      +'</div>';

    if(!isSettled){
      // Tlačítko vyúčtovat měsíc
      h+='<button onclick="settleMonth(\''+m+'\')" style="width:100%;padding:13px;background:#ff2d78;color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:4px">'
        +(netM>=0
           ?'Vyúčtovat '+monthLbl+' — Jitka platí '+fmt(netM)
           :'Vyúčtovat '+monthLbl+' — zaplať Jitce '+fmt(Math.abs(netM)))
        +'</button>';
    }else{
      // Oprava: znovu otevřít celý měsíc
      h+='<button onclick="unsettleMonth(\''+m+'\')" style="width:100%;padding:11px;background:#fff;color:#6c6c70;border:1px solid #e0e0e0;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:4px">↩ Znovu otevřít '+monthLbl+' (opravit)</button>';
    }

    // Vyúčtované položky tohoto měsíce (šedě)

      var paidTotal=paidItems.reduce(function(s,e){return s+(e.amount||0)},0);
      var paidSecId='jp-'+m.replace('-','');
      h+='<div style="margin-top:6px">'
        +'<div onclick="toggleJitkaMonth(\''+paidSecId+'\')" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0">'
        +'<span style="font-size:12px;color:#aeaeb2">Zaplaceno ('+paidItems.length+' pol. · '+fmt(paidTotal/2)+')</span>'
        +'<span id="chev-'+paidSecId+'" style="font-size:10px;color:#aeaeb2;transition:transform .2s;display:inline-block">▶</span>'
        +'</div>'
        +'<div id="'+paidSecId+'" style="display:none"><div class="card">';
      [].concat(paidItems).sort(function(a,b){return b.date.localeCompare(a.date)}).forEach(function(e){
        var cat=catByKey(e.catKey);
        var dt2=new Date(e.date+'T12:00:00');
        var dayLbl=dt2.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
        h+='<div class="exp-row" style="opacity:.5">'
          +'<div class="exp-ico">'+(cat?cat.i:'❓')+'</div>'
          +'<div class="exp-info"><div class="exp-cat">'+(cat?cat.l:e.catKey)+'</div>'
          +'<div class="exp-sub">'+dayLbl+(e.subcat?' · '+e.subcat:'')+'</div></div>'
          +'<div style="font-size:13px;font-weight:500;color:#34c759;text-decoration:line-through;flex-shrink:0">'+fmt(e.amount/2)+'</div>'
          +'<button onclick="event.stopPropagation();unSettleExp(\''+e.id+'\')" style="background:none;border:1px solid #aeaeb2;border-radius:8px;cursor:pointer;font-size:11px;color:#aeaeb2;padding:4px 6px;flex-shrink:0;margin-left:4px">↩</button>'
          +'</div>';
      });
      h+='</div></div></div>';
    }

    var famM=famForMonth(m);
    if(famM.total>0){
      h+='<div class="card" style="margin-bottom:8px;padding:12px 14px;background:#fff7ed;border-color:#ffd8a8">'
        +'<div style="font-size:14px;font-weight:600;color:#ff9500;margin-bottom:8px">👪 Rodinné výdaje, které neseš sám <span style="font-weight:400;color:#8e8e93;font-size:11px">(informativní)</span></div>';
      famM.items.forEach(function(e){
        var cat=catByKey(e.catKey);
        h+='<div style="display:flex;justify-content:space-between;font-size:13px;color:#444;padding:2px 0"><span>'+(cat?cat.l:e.catKey)+(e.subcat?' · '+e.subcat:'')+(e.note?' — '+e.note:'')+'</span><span style="color:#1c1c1e;font-weight:500">'+fmt(e.amount)+'</span></div>';
      });
      famM.recurItems.forEach(function(t){
        h+='<div style="display:flex;justify-content:space-between;font-size:13px;color:#444;padding:2px 0"><span>🔁 '+t.nazev+' <span style="color:#8e8e93;font-size:11px">trvalé</span></span><span style="color:#1c1c1e;font-weight:500">'+fmt(t.castka)+'</span></div>';
      });
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #ffe4c4;font-size:15px;font-weight:700"><span style="color:#1c1c1e">Celkem mimo sdílené</span><span style="color:#ff9500">'+fmt(famM.total)+'</span></div>'
        +'<div style="font-size:11px;color:#8e8e93;margin-top:6px">Nevstupuje do vyrovnání — jen ukazuje, kolik do rodiny dáváš nad rámec sdílených výdajů.</div>'
        +'</div>';
    }

    h+='</div></div>'; // close sectionId + month wrapper
  });

  return h;
}

function printMonth(m){
  var items=exps.filter(function(e){return e.shared&&e.date.slice(0,7)===m});
  if(!items.length)return;
  var dt=new Date(m+'-01T12:00:00');
  var monthLbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
  var unpaid=items.filter(function(e){return !e.jitkaSettled});
  var paid=items.filter(function(e){return e.jitkaSettled});
  var totalAll=items.reduce(function(s,e){return s+(e.amount||0)},0);
  var totalUnpaid=unpaid.reduce(function(s,e){return s+(e.amount||0)},0);
  var isSettled=unpaid.length===0;

  function row(e,settled){
    var cat=catByKey(e.catKey);
    var d=new Date(e.date+'T12:00:00').toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
    var desc=(cat?cat.l:e.catKey)+(e.subcat?' / '+e.subcat:'')+(e.note?' — '+e.note:'');
    var color='#222';
    var halfColor='#222';
    var strike='';
    return '<tr style="border-bottom:1px solid #f0f0f0">'
      +'<td style="padding:8px 6px;color:#888;font-size:13px;white-space:nowrap">'+d+'</td>'
      +'<td style="padding:8px 6px;font-size:14px;color:'+color+';'+strike+'">'+desc+'</td>'
      +'<td style="padding:8px 6px;text-align:right;font-size:14px;font-weight:500;color:'+color+';'+strike+'">'+fmt(e.amount)+'</td>'
      +'<td style="padding:8px 6px;text-align:right;font-size:14px;font-weight:700;color:'+halfColor+';'+strike+'">'+fmt(e.amount/2)+'</td>'
      +'</tr>';
  }

  var rows='';
  [].concat(unpaid).sort(function(a,b){return a.date.localeCompare(b.date)}).forEach(function(e){rows+=row(e,false);});
  [].concat(paid).sort(function(a,b){return a.date.localeCompare(b.date)}).forEach(function(e){rows+=row(e,true);});

  var statusBadge=isSettled
    ?'<span style="background:#34c759;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-left:10px">VYÚČTOVÁNO</span>'
    :'<span style="background:#ff2d78;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-left:10px">K VYÚČTOVÁNÍ</span>';

  var claim=jitkaClaims[m]||0;

    if(claim>0){
      summaryLine+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:#444"><span>Spoluúčast Lukáše z nákupů Jitky ('+fmt(claim)+' ÷ 2)</span><span style="font-weight:600;color:#1c1c1e">− '+fmt(claim/2)+'</span></div>';
    }
    summaryLine+='<div style="display:flex;justify-content:space-between;padding:8px 0 0;margin-top:6px;border-top:1px solid #e0e0e0;font-size:17px;font-weight:700;color:#1c8a3a">'
      +(netS>=0
         ?'<span>✓ Vyrovnáno — Jitka platí Lukášovi</span><span>'+fmt(netS)+'</span>'
         :'<span>✓ Vyrovnáno — Lukáš platí Jitce</span><span>'+fmt(Math.abs(netS))+'</span>')
      +'</div>';
  }else{
    var net=totalUnpaid/2 - claim/2;
    summaryLine='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:#444"><span>Jitka dluží Lukášovi (sdílené výdaje ÷ 2)</span><span style="font-weight:600;color:#1c1c1e">'+fmt(totalUnpaid/2)+'</span></div>';
    if(claim>0){
      summaryLine+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:#444"><span>Spoluúčast Lukáše z nákupů Jitky ('+fmt(claim)+' ÷ 2)</span><span style="font-weight:600;color:#1c1c1e">− '+fmt(claim/2)+'</span></div>';
    }
    summaryLine+='<div style="display:flex;justify-content:space-between;padding:8px 0 0;margin-top:6px;border-top:1px solid #e0e0e0;font-size:17px;font-weight:700">'
      +(net>=0

      +(paid.length?'<p style="margin:8px 0 0;font-size:12px;color:#999">Dříve vyrovnáno '+fmt((totalAll-totalUnpaid)/2)+'</p>':'');
  }

  var famM=famForMonth(m);
  var famHtml='';
  if(famM.total>0){
    var fr='';

    famM.recurItems.forEach(function(t){
      fr+='<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:8px 6px;color:#888;font-size:13px;white-space:nowrap">🔁 trvalé</td><td style="padding:8px 6px;font-size:14px;color:#222">'+t.nazev+'</td><td style="padding:8px 6px;text-align:right;font-size:14px;font-weight:600;color:#ff9500">'+fmt(t.castka)+'</td></tr>';
    });
    famHtml='<h2 style="font-size:16px;font-weight:700;margin-top:28px;color:#ff9500">Rodinné výdaje, které nese Lukáš <span style="font-weight:400;font-size:12px;color:#888">(informativní — nevstupuje do vyrovnání)</span></h2>'

  var shareJ=claim;             // nákupy Jitky (platila Jitka)
  var shareR=famM.total;        // rodinné, které nesu sám (vč. rodinných trvalých plateb)

      +'</div>'
      +'<table style="width:100%;border-collapse:collapse;margin-top:14px"><tbody>'
      +'<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:10px 6px"><div style="font-size:15px;font-weight:600;color:#222"><span style="color:#ff9500">●</span> Lukáš</div><div style="font-size:12px;color:#888">'+lukasSub+'</div></td><td style="padding:10px 6px;text-align:right;white-space:nowrap"><div style="font-size:16px;font-weight:700;color:#222">'+fmt(lukasPaid)+'</div><div style="font-size:13px;font-weight:600;color:#ff9500">'+lPct+' %</div></td></tr>'
      +'<tr><td style="padding:10px 6px"><div style="font-size:15px;font-weight:600;color:#222"><span style="color:#ff2d78">●</span> Jitka</div><div style="font-size:12px;color:#888">'+jitkaSub+'</div></td><td style="padding:10px 6px;text-align:right;white-space:nowrap"><div style="font-size:16px;font-weight:700;color:#222">'+fmt(jitkaPaid)+'</div><div style="font-size:13px;font-weight:600;color:#ff2d78">'+jPct+' %</div></td></tr>'
      +'</tbody></table>';
  }

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>Vyúčtování — Lukáš &amp; Jitka — '+monthLbl+'</title>'
    +'<style>'
    +'*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Arial,sans-serif}'
    +'body{padding:32px 40px;color:#1c1c1e;max-width:600px;margin:0 auto}'
    +'h1{font-size:22px;font-weight:700;color:#1c1c1e}'
    +'table{width:100%;border-collapse:collapse;margin-top:16px}'
    +'th{padding:8px 6px;text-align:left;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e0e0e0}'
    +'th:nth-child(3),th:nth-child(4){text-align:right}'

    +'.summary{margin-top:24px;padding:16px;background:#f9f9f9;border-radius:10px;border:1px solid #e0e0e0}'
    +'@media print{'
    +'  body{padding:20px}'
    +'  button{display:none!important}'
    +'  tr{page-break-inside:avoid;break-inside:avoid}'
    +'  thead{display:table-header-group}'
    +'  h2{page-break-after:avoid;break-after:avoid}'
    +'  .summary{page-break-inside:avoid;break-inside:avoid}'
    +'  .keep-together{page-break-inside:avoid;break-inside:avoid}'
    +'}'
    +'</style></head><body>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<h1>Vyúčtování — Lukáš &amp; Jitka</h1>'
    +'<button onclick="window.print()" style="padding:8px 16px;background:#1c1c1e;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">🖨 Uložit jako PDF</button>'
    +'</div>'
    +'<p style="font-size:16px;color:#6c6c70;margin-bottom:20px">'+monthLbl+statusBadge+'</p>'
    +'<table>'
    +'<thead><tr>'
    +'<th>Datum</th><th>Výdaj</th><th>Celkem</th><th>Polovina</th>'
    +'</tr></thead><tbody>'
    +rows
    +'<tr class="total-row">'
    +'<td colspan="2">Celkem sdíleno</td>'
    +'<td style="text-align:right">'+fmt(totalAll)+'</td>'
    +'<td style="text-align:right;color:#e8003d">'+fmt(totalAll/2)+'</td>'
    +'</tr>'
    +'</tbody></table>'
    +'<div class="summary">'+summaryLine+'</div>'
    +'<div class="keep-together">'+famHtml+'</div>'
    +'<div class="keep-together">'+shareHtml+'</div>'

function toggleJitkaMonth(id){
  var el=document.getElementById(id);
  var chev=document.getElementById('chev-'+id);
  if(!el)return;
  var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(chev)chev.style.transform=open?'':'rotate(90deg)';
}

function settleExp(id){
  exps=exps.map(function(e){return e.id===id?Object.assign({},e,{jitkaSettled:true,settledDate:today()}):e;});
  ghSave();renderHome();showToast('Označeno jako zaplaceno ✓');
}

function unSettleExp(id){
  exps=exps.map(function(e){return e.id===id?Object.assign({},e,{jitkaSettled:false,settledDate:''}):e;});
  ghSave();renderHome();
}

function settleMonth(m){
  var items=exps.filter(function(e){return e.shared&&!e.jitkaSettled&&e.date.slice(0,7)===m});
  var total=items.reduce(function(s,e){return s+(e.amount||0)},0);
  var dt=new Date(m+'-01T12:00:00');
  var lbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
  var claim=jitkaClaims[m]||0;
  var net=total/2 - claim/2;
  var msg=net>=0 ? 'Jitka zaplatí '+fmt(net)+'.' : 'Zaplatíš Jitce '+fmt(Math.abs(net))+'.';
  if(!confirm('Vyúčtovat '+lbl+'?\n'+msg))return;
  exps=exps.map(function(e){
    return (e.shared&&!e.jitkaSettled&&e.date.slice(0,7)===m)?Object.assign({},e,{jitkaSettled:true,settledDate:today()}):e;
  });
  ghSave();renderHome();showToast(lbl+' vyúčtováno ✓');
}

function unsettleMonth(m){
  var dt=new Date(m+'-01T12:00:00');
  var lbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
  if(!confirm('Znovu otevřít '+lbl+'?\nVšechny položky se vrátí mezi nevyúčtované, abys mohl vyúčtování opravit.'))return;
  exps=exps.map(function(e){
    return (e.shared&&e.jitkaSettled&&e.date.slice(0,7)===m)?Object.assign({},e,{jitkaSettled:false,settledDate:''}):e;
  });
  ghSave();renderHome();showToast(lbl+' znovu otevřeno');
}

function setJitkaClaim(m,val){
  var n=parseFloat(String(val).replace(',','.').replace(/\s/g,''))||0;
  if(n>0) jitkaClaims[m]=Math.round(n*100)/100; else delete jitkaClaims[m];
  localStorage.setItem('vyd_jitka_claims',JSON.stringify(jitkaClaims));
  ghSaveCfg();
  renderHome();
}

function settleAll(){
  var unpaidTotal=exps.filter(function(e){return e.shared&&!e.jitkaSettled}).reduce(function(s,e){return s+(e.amount||0)},0);
  if(!confirm('Označit všechny nezaplacené jako vyúčtované?\nJitka zaplatí '+fmt(unpaidTotal/2)+'.'))return;
  exps=exps.map(function(e){return (e.shared&&!e.jitkaSettled)?Object.assign({},e,{jitkaSettled:true,settledDate:today()}):e;});
  ghSave();renderHome();showToast('Vše vyúčtováno ✓');
}

function renderExport(){
  var total=exps.reduce(function(s,e){return s+(e.amount||0)},0);
  var tok=ghToken();
  var ghSection=!tok
    ?'<div class="card" style="margin-bottom:16px"><div style="padding:14px 16px">'
      +'<div style="font-size:15px;font-weight:500;color:#1c1c1e;margin-bottom:8px">Google Drive synchronizace</div>'
      +'<div style="font-size:13px;color:#6c6c70;margin-bottom:10px">Přihlas se Googlem pro ukládání na Disk a sync napříč zařízeními</div>'
      +'<button onclick="connectGoogle()" style="width:100%;padding:12px;background:#007aff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">Přihlásit se Googlem</button>'
      +'</div></div>'
    :'<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 12px"><span style="font-size:13px;color:#34c759">● Google Drive sync aktivní</span><button onclick="disconnectGoogle()" style="font-size:12px;color:#6c6c70;background:none;border:1px solid #e0e0e0;border-radius:20px;padding:4px 10px;cursor:pointer">Odhlásit</button></div>';

  var h=ghSection
    +'<div class="card">'
    +'<div class="crow" onclick="exportCSV()"><div class="crow-icon">📤</div><div class="crow-label">Exportovat CSV</div></div>'
    +'<div class="crow" onclick="importCSV()"><div class="crow-icon">📥</div><div class="crow-label">Importovat CSV</div></div>'
    +'<div class="crow" onclick="clearAll()"><div class="crow-icon">🗑</div><div class="crow-label" style="color:#ff3b30">Smazat vše</div></div>'
    +'</div>'
    +'<input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleImport(this)">';
  var months={};
  exps.forEach(function(e){var m=e.date.slice(0,7);if(!months[m])months[m]=[];months[m].push(e)});
  if(Object.keys(months).length){
    h+='<div class="sec-hdr">Přehled po měsících — '+fmt(total)+'</div><div class="card">';
    Object.keys(months).sort(function(a,b){return b.localeCompare(a)}).forEach(function(m){
      var items=months[m];
      var t=items.reduce(function(s,e){return s+(e.amount||0)},0);
      var dt=new Date(m+'-01T12:00:00');
      var lbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
      h+='<div class="exp-row"><div class="exp-info"><div class="exp-cat">'+lbl+'</div><div class="exp-sub">'+items.length+' výdajů</div></div><div class="exp-amt">'+fmt(t)+'</div></div>';
    });
    h+='</div>';
  }
  return h;
}

function delExp(id){
  if(!confirm('Smazat výdaj?'))return;
  exps=exps.filter(function(e){return e.id!==id});
  ghSave();renderHome();showToast('Smazáno');
}

function importCSV(){
  var el=document.getElementById('csv-file');
  if(el)el.click();
}

function handleImport(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      // Použij TextDecoder pro správné UTF-8 dekódování na iOS
      var bytes=new Uint8Array(e.target.result);
      var text=new TextDecoder('utf-8').decode(bytes).replace(/^\uFEFF/,'');
      var lines=text.trim().split('\n');
      if(lines.length<2){showToast('CSV je prázdné');return}
      var imported=0;
      for(var i=1;i<lines.length;i++){
        var cols=lines[i].split(';');
        if(cols.length<4)continue;
        var date=cols[0].trim();
        var catLabel=cols[1].trim();
        var subcat=cols[2].trim();
        var amount=parseFloat(cols[3])||0;
        var note=cols[4]?cols[4].trim():'';
        var shared=cols[5]?cols[5].trim()==='ano':false;
        var jitkaSettled=cols[6]?cols[6].trim()==='ano':false;
        var rodinny=cols[7]?cols[7].trim()==='ano':false;
        if(!date||amount<=0)continue;
        var catKey='ostatni';
        for(var j=0;j<CATS.length;j++){
          if(CATS[j].l===catLabel){catKey=CATS[j].k;break}
        }
        var dup=false;
        for(var k=0;k<exps.length;k++){
          if(exps[k].date===date&&exps[k].amount===amount&&exps[k].catKey===catKey){dup=true;break}
        }
        if(!dup){
          exps.push({id:Date.now().toString()+i,amount:amount,catKey:catKey,subcat:subcat,note:note,date:date,shared:shared,jitkaSettled:jitkaSettled,rodinny:rodinny});
          imported++;
        }
      }
      ghSave();
      showToast('Importováno '+imported+' výdajů ✓');
      renderHome();
    }catch(err){
      showToast('Chyba při importu');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function exportCSV(){
  if(!exps.length){showToast('Žádná data');return}
  var hdr=['datum','kategorie','podkategorie','castka','poznamka','sdileno_jitka','vyuctovano','rodinny'];
  var rows=[hdr.join(';')];
  [].concat(exps).sort(function(a,b){return a.date.localeCompare(b.date)}).forEach(function(e){
    var cat=catByKey(e.catKey);
    rows.push([e.date,cat?cat.l:e.catKey,e.subcat||'',e.amount,e.note||'',e.shared?'ano':'ne',e.jitkaSettled?'ano':'ne',e.rodinny?'ano':'ne'].join(';'));
  });
  var blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vydaje_'+today()+'.csv';a.click();showToast('Exportováno');
}

function clearAll(){
  if(!confirm('Smazat vše?'))return;
  exps=[];ghSave();renderHome();showToast('Smazáno');
}

function startupSync(tries){
  if(isConnected() && GOOGLE_CLIENT_ID){
    if(!gisReady()){
      if((tries||0)<20){ setTimeout(function(){startupSync((tries||0)+1);},250); return; }
      updateSyncIcon('error'); renderHome(); return;
    }
    updateSyncIcon('syncing');
    Promise.all([ghLoad(),ghLoadTrvale(),ghLoadFinance(),ghLoadCfg()]).then(function(){renderHome();updateSyncIcon('ok');});
  } else {
    updateSyncIcon('local'); renderHome();
  }
}
window.onload=function(){ startupSync(0); };
</script>
